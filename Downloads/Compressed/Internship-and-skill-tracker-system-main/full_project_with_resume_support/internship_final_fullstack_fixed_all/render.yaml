services:
  - type: web
    name: internship-tracker
    runtime: node
    region: oregon
    plan: starter
    
    # Build command - uses build.sh script
    buildCommand: bash build.sh
    
    # Start command - uses start.sh script
    startCommand: bash start.sh
    
    # Environment variables
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SIGNUP_FROM
        sync: false
      - key: LOGIN_FROM
        sync: false
      - key: TEST_TO
        sync: false
    
    # Health check
    healthCheckPath: /health
